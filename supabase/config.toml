# MOAJOA Supabase local config.
# `supabase start` reads this. After `supabase link`, deployed project settings
# in the dashboard take precedence.

project_id = "moajoa"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "moajoa://auth-callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # local dev only — production: true

[auth.external.apple]
enabled = false
client_id = "env(APPLE_SERVICE_ID)"
secret = "env(APPLE_SECRET)"

[auth.external.google]
enabled = false
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"

[auth.external.kakao]
enabled = true
client_id = "env(KAKAO_REST_API_KEY)"
secret = "env(KAKAO_CLIENT_SECRET)"

[functions.extract-youtube]
verify_jwt = true

# Phase 21 ledger inbound pipeline. Both are called machine-to-machine (CF Email
# Worker → inbound-email → parse-email), not by signed-in users, so JWT verify is
# off; the compensating control is a shared x-ingest-secret header (Pitfall 7).
[functions.inbound-email]
verify_jwt = false

[functions.parse-email]
verify_jwt = false

# Vector log aggregator bind-mounts the host Docker socket, which colima cannot
# mount from ~/.colima/default/docker.sock (non-shared VM path) — it crashes the
# stack on `supabase start`. Analytics/log shipping is not needed for local dev,
# db reset, or type generation, so disable it. (17-03 Task 2 env fix.)
[analytics]
enabled = false
