packages:
  - "apps/*"
  - "packages/*"
  # Local Expo native modules under apps/ios/modules — registering as workspace
  # packages so expo-modules-autolinking picks them up via node_modules (P0
  # hotfix #4 dogfooding day-1: SharedDefaults runtime "Cannot find native
  # module" before this registration).
  - "apps/ios/modules/*"
